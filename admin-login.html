<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – Easy Darshan</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">🛕 Easy <span>Darshan</span></a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
    </ul>
    <div class="user-pill" id="userPill">
      <div class="avatar" id="userAvatar">A</div>
      <span id="userNameEl"></span>
      <button id="logoutBtn">✕</button>
    </div>
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="icon">🔐</span>
      <h2>Admin Portal</h2>
      <p>Staff & Temple Administrator Access</p>
    </div>
    <div class="alert alert-warning" style="margin-bottom:1.5rem;">
      ⚠️ This portal is for authorized temple staff only. Visitor accounts are not permitted here.
    </div>
    <div id="errorMsg" class="alert alert-error" style="display:none;"></div>
    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" id="username" class="form-control" placeholder="Admin username" />
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="Admin password" />
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;" id="loginBtn" onclick="doAdminLogin()">
      🔐 Admin Login
    </button>
    <hr class="divider" />
    <div style="text-align:center;font-size:0.8rem;color:var(--text-muted);">
      Demo credentials: username <strong style="color:var(--gold);">admin</strong> / password <strong style="color:var(--gold);">admin123</strong>
    </div>
    <div class="auth-footer">
      <a href="index.html">← Back to Homepage</a>
    </div>
  </div>
</div>

<!-- CHATBOT -->
<button class="chatbot-fab" id="chatbotFab">🙏</button>
<div class="chatbot-window" id="chatbotWindow">
  <div class="chatbot-header"><h4>🤖 Easy Darshan Assistant</h4><button class="chatbot-close" id="chatbotClose">✕</button></div>
  <div class="chatbot-messages" id="chatMessages"></div>
  <div class="suggested-qs" id="suggestedQuestions"></div>
  <div class="chatbot-input"><input type="text" id="chatInput" placeholder="Ask me anything..." /><button id="chatSend">➤</button></div>
</div>

<script src="js/main.js"></script>
<script>
  if (Auth.isAdmin()) window.location.href = 'admin-dashboard.html';

  async function doAdminLogin() {
    const btn = document.getElementById('loginBtn');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('errorMsg');
    errEl.style.display = 'none';

    if (!username || !password) {
      errEl.textContent = '⚠️ Username and password are required.'; errEl.style.display = 'flex'; return;
    }

    btn.textContent = 'Authenticating...'; btn.disabled = true;
    try {
      const data = await apiCall('/auth/admin-login', 'POST', { username, password });
      Auth.save(data.token, data.user);
      showToast('Admin access granted 🔐', 'success');
      setTimeout(() => window.location.href = 'admin-dashboard.html', 800);
    } catch (err) {
      errEl.textContent = '❌ ' + err.message; errEl.style.display = 'flex';
      btn.textContent = '🔐 Admin Login'; btn.disabled = false;
    }
  }

  document.addEventListener('keypress', e => { if (e.key === 'Enter') doAdminLogin(); });
</script>
</body>
</html>
